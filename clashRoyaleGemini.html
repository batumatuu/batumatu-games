<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="msapplication-navbutton-color" content="#1a1a1a">
    <title>Clash Royale Prototype | Antigravity</title>
    <style>
        :root {
            --primary-blue: #3498db;
            --primary-red: #e74c3c;
            --primary-gold: #f1c40f;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --vh: 1vh;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        html {
            height: 100%;
            height: -webkit-fill-available;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: var(--font-main);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            height: -webkit-fill-available;
            touch-action: none;
            overscroll-behavior: none;
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: calc(var(--vh, 1vh) * 100);
            overflow: hidden;
        }

        #bg {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: calc(var(--vh, 1vh) * 100);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: max(10px, var(--safe-top)) max(10px, var(--safe-right)) max(10px, var(--safe-bottom)) max(10px, var(--safe-left));
            box-sizing: border-box;
            z-index: 10;
        }

        /* ===== TOP STATS BAR ===== */
        #stats {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(10px, 3vw, 20px);
            pointer-events: auto;
            flex-wrap: wrap;
        }

        #elixir-container {
            width: clamp(150px, 40vw, 300px);
            height: clamp(20px, 4vh, 30px);
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        #elixir-bar {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #9b59b6, #8e44ad);
            transition: width 0.1s linear;
            border-radius: 15px;
        }

        #elixir-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: clamp(11px, 2.5vw, 16px);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Elixir drop icon */
        #elixir-icon {
            font-size: clamp(18px, 4vw, 28px);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* ===== TIMER ===== */
        #timer-container {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.5);
            padding: clamp(5px, 1.5vw, 10px) clamp(10px, 3vw, 20px);
            border-radius: 20px;
            border: 2px solid var(--glass-border);
        }

        #timer-text {
            color: white;
            font-weight: bold;
            font-size: clamp(14px, 3vw, 20px);
            font-variant-numeric: tabular-nums;
        }

        /* ===== CARDS CONTAINER ===== */
        #cards-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(8px, 2vh, 15px);
            justify-content: flex-end;
            pointer-events: auto;
            padding-bottom: max(10px, var(--safe-bottom));
        }

        .cards-row {
            display: flex;
            gap: clamp(8px, 2vw, 15px);
            justify-content: center;
            flex-wrap: wrap;
        }

        #instruction {
            color: var(--primary-gold);
            font-size: clamp(10px, 2.5vw, 14px);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: clamp(0.5px, 0.2vw, 1px);
            margin-bottom: clamp(3px, 1vh, 8px);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            text-align: center;
            padding: 0 10px;
        }

        /* ===== CARD STYLES ===== */
        .card {
            width: clamp(70px, 18vw, 100px);
            height: clamp(95px, 25vw, 140px);
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: clamp(8px, 2vw, 12px);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            position: relative;
            touch-action: none;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border-color: var(--primary-gold);
        }

        .card:active, .card.active {
            cursor: grabbing;
            transform: scale(0.95);
            border-color: var(--primary-gold);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
        }

        .card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
            pointer-events: none;
        }

        .card.selected {
            border-color: var(--primary-gold);
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.6);
            transform: translateY(-8px) scale(1.05);
        }

        .card-icon {
            font-size: clamp(28px, 8vw, 48px);
            margin-bottom: clamp(5px, 1.5vh, 10px);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .card-name {
            color: white;
            font-size: clamp(10px, 2.5vw, 14px);
            font-weight: 600;
            text-align: center;
        }

        .card-cost {
            position: absolute;
            top: clamp(-8px, -2vw, -10px);
            right: clamp(-8px, -2vw, -10px);
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            width: clamp(20px, 5vw, 28px);
            height: clamp(20px, 5vw, 28px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(10px, 2.5vw, 14px);
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* ===== NEXT CARD ===== */
        #next-card-container {
            display: flex;
            align-items: center;
            gap: clamp(5px, 1.5vw, 10px);
            margin-top: clamp(5px, 1.5vh, 10px);
        }

        #next-card-label {
            color: #888;
            font-size: clamp(9px, 2vw, 12px);
            font-weight: 600;
            text-transform: uppercase;
        }

        .next-card {
            width: clamp(40px, 10vw, 55px);
            height: clamp(55px, 14vw, 75px);
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: clamp(5px, 1.5vw, 8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }

        .next-card .card-icon {
            font-size: clamp(20px, 5vw, 28px);
            margin: 0;
        }

        /* ===== GAME OVER MODAL ===== */
        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: calc(var(--vh, 1vh) * 100);
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        #game-over.hidden {
            display: none;
        }

        .modal {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            padding: clamp(25px, 6vw, 50px);
            border-radius: clamp(15px, 4vw, 25px);
            text-align: center;
            border: 4px solid var(--primary-gold);
            color: white;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal h1 {
            font-size: clamp(28px, 8vw, 56px);
            margin-bottom: clamp(15px, 4vw, 25px);
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .modal p {
            font-size: clamp(12px, 3vw, 18px);
            color: #bbb;
            margin-bottom: clamp(15px, 4vw, 25px);
        }

        .modal button {
            padding: clamp(10px, 3vw, 15px) clamp(25px, 7vw, 40px);
            font-size: clamp(14px, 3.5vw, 20px);
            background: linear-gradient(135deg, var(--primary-gold), #d4ac0d);
            border: none;
            border-radius: clamp(8px, 2vw, 12px);
            color: #2c3e50;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
            min-height: 44px;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3);
        }

        .modal button:hover, .modal button:active {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(241, 196, 15, 0.5);
        }

        /* ===== GHOST CARD (DRAG PREVIEW) ===== */
        #ghost-card {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.1s;
            transform: translate(-50%, -50%);
        }

        #ghost-card.visible {
            opacity: 0.9;
        }

        #ghost-card.dragging {
            opacity: 1;
        }

        .ghost-card-inner {
            width: clamp(60px, 14vw, 80px);
            height: clamp(80px, 20vw, 110px);
            background: rgba(241, 196, 15, 0.3);
            border: 3px solid var(--primary-gold);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(241, 196, 15, 0.5), 0 0 20px rgba(241, 196, 15, 0.3);
            animation: ghostPulse 0.5s ease-in-out infinite;
        }

        .ghost-card-inner .card-icon {
            font-size: clamp(28px, 7vw, 40px);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .ghost-card-inner .card-name {
            font-size: clamp(10px, 2.5vw, 14px);
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            margin-top: 5px;
        }

        @keyframes ghostPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(241, 196, 15, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 15px 50px rgba(241, 196, 15, 0.7); }
        }

        /* Card being dragged */
        .card.dragging {
            opacity: 0.4;
            transform: scale(0.95);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Valid drop zone highlight */
        #bg.drop-valid {
            cursor: crosshair;
        }

        /* Range indicator for deployment */
        #range-indicator {
            position: fixed;
            pointer-events: none;
            z-index: 998;
            opacity: 0;
            transition: opacity 0.15s;
        }

        #range-indicator.visible {
            opacity: 1;
        }

        .range-circle {
            width: clamp(80px, 20vw, 120px);
            height: clamp(80px, 20vw, 120px);
            border: 3px dashed rgba(241, 196, 15, 0.6);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(241, 196, 15, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: rangeExpand 0.8s ease-out infinite;
        }

        @keyframes rangeExpand {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.5; }
        }

        .range-circle.invalid {
            border-color: rgba(231, 76, 60, 0.8);
            background: radial-gradient(circle, rgba(231, 76, 60, 0.15) 0%, transparent 70%);
        }

        /* Deployment trail effect */
        .deploy-trail {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--primary-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 997;
            opacity: 0.6;
            animation: trailFade 0.3s forwards;
        }

        @keyframes trailFade {
            to { opacity: 0; transform: scale(0); }
        }

        /* ===== SPAWN INDICATOR ===== */
        #spawn-indicator {
            position: fixed;
            width: clamp(50px, 12vw, 80px);
            height: clamp(50px, 12vw, 80px);
            border: 3px dashed var(--primary-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.15s;
            transform: translate(-50%, -50%);
        }

        #spawn-indicator.visible {
            opacity: 1;
            animation: pulse 0.8s infinite;
        }

        #spawn-indicator.invalid {
            border-color: var(--primary-red);
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        /* ===== TOWER HP INDICATORS ===== */
        .tower-hp-ui {
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            pointer-events: none;
            z-index: 50;
        }

        .tower-hp-bar {
            width: clamp(40px, 10vw, 60px);
            height: clamp(6px, 1.5vw, 10px);
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow: hidden;
        }

        .tower-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.3s;
        }

        .tower-hp-fill.enemy {
            background: linear-gradient(90deg, #e74c3c, #c0392b);
        }

        /* ===== DAMAGE NUMBERS ===== */
        .damage-number {
            position: fixed;
            color: #ff6b6b;
            font-size: clamp(14px, 3.5vw, 20px);
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 200;
            animation: damageFloat 1s forwards;
        }

        @keyframes damageFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(0.8); }
        }

        /* ===== RESPONSIVE BREAKPOINTS ===== */
        
        /* Landscape phones */
        @media (max-height: 500px) and (orientation: landscape) {
            #ui-layer {
                padding: 5px max(8px, var(--safe-right)) 5px max(8px, var(--safe-left));
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-end;
            }

            #stats {
                position: absolute;
                top: 5px;
                left: 50%;
                transform: translateX(-50%);
                flex-direction: row;
            }

            #elixir-container {
                width: clamp(120px, 25vw, 200px);
                height: clamp(16px, 3vh, 22px);
            }

            #timer-container {
                padding: 4px 10px;
            }

            #cards-container {
                position: absolute;
                bottom: 5px;
                right: max(10px, var(--safe-right));
                flex-direction: row;
                align-items: flex-end;
                gap: 8px;
            }

            .cards-row {
                gap: clamp(5px, 1.5vw, 10px);
            }

            .card {
                width: clamp(55px, 12vw, 75px);
                height: clamp(75px, 16vw, 100px);
            }

            .card-icon {
                font-size: clamp(22px, 5vw, 32px);
            }

            .card-name {
                font-size: clamp(8px, 1.8vw, 11px);
            }

            .card-cost {
                width: clamp(16px, 4vw, 22px);
                height: clamp(16px, 4vw, 22px);
                font-size: clamp(9px, 2vw, 12px);
            }

            #instruction {
                display: none;
            }

            #next-card-container {
                display: none;
            }
        }

        /* Portrait phones */
        @media (max-width: 480px) and (orientation: portrait) {
            .card {
                width: clamp(65px, 20vw, 85px);
                height: clamp(90px, 26vw, 115px);
            }

            .card-icon {
                font-size: clamp(26px, 7vw, 36px);
            }
        }

        /* Small phones */
        @media (max-width: 360px) {
            .card {
                width: 60px;
                height: 82px;
            }

            .card-icon {
                font-size: 24px;
            }

            .card-name {
                font-size: 9px;
            }

            #elixir-container {
                width: 130px;
            }
        }

        /* Tablets */
        @media (min-width: 768px) and (max-width: 1024px) {
            .card {
                width: clamp(85px, 12vw, 100px);
                height: clamp(115px, 16vw, 140px);
            }

            #elixir-container {
                width: clamp(200px, 30vw, 280px);
            }
        }

        /* Desktop hover effects (only for mouse devices) */
        @media (hover: hover) and (pointer: fine) {
            .card:hover {
                transform: translateY(-10px);
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            }
        }

        /* Touch devices - remove hover effects */
        @media (hover: none) {
            .card:hover {
                transform: none;
                box-shadow: none;
            }
        }

        .dragging {
            opacity: 0.3;
        }

        /* ===== HAPTIC FEEDBACK VISUAL ===== */
        .haptic-flash {
            animation: hapticFlash 0.1s;
        }

        @keyframes hapticFlash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="bg"></canvas>

        <div id="ui-layer">
            <div id="stats">
                <span id="elixir-icon">💧</span>
                <div id="elixir-container">
                    <div id="elixir-bar"></div>
                    <span id="elixir-text">5/10</span>
                </div>
                <div id="timer-container">
                    <span id="timer-text">3:00</span>
                </div>
            </div>

            <div id="cards-container">
                <div id="instruction">Drag cards to the field to deploy</div>
                <div class="cards-row" id="main-cards">
                    <div class="card" id="card-knight" data-type="knight" data-cost="3">
                        <div class="card-icon">⚔️</div>
                        <div class="card-info">
                            <span class="card-name">Knight</span>
                        </div>
                        <span class="card-cost">3</span>
                    </div>
                    <div class="card" id="card-archer" data-type="archer" data-cost="2">
                        <div class="card-icon">🏹</div>
                        <div class="card-info">
                            <span class="card-name">Archer</span>
                        </div>
                        <span class="card-cost">2</span>
                    </div>
                    <div class="card" id="card-giant" data-type="giant" data-cost="5">
                        <div class="card-icon">👑</div>
                        <div class="card-info">
                            <span class="card-name">Giant</span>
                        </div>
                        <span class="card-cost">5</span>
                    </div>
                    <div class="card" id="card-wizard" data-type="wizard" data-cost="4">
                        <div class="card-icon">🔥</div>
                        <div class="card-info">
                            <span class="card-name">Wizard</span>
                        </div>
                        <span class="card-cost">4</span>
                    </div>
                </div>
                <div id="next-card-container">
                    <span id="next-card-label">Next:</span>
                    <div class="next-card" id="next-card">
                        <div class="card-icon">⚔️</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ghost card for drag preview -->
        <div id="ghost-card">
            <div class="ghost-card-inner">
                <div class="card-icon">⚔️</div>
                <div class="card-name">Knight</div>
            </div>
        </div>

        <!-- Range indicator -->
        <div id="range-indicator">
            <div class="range-circle"></div>
        </div>

        <!-- Spawn indicator -->
        <div id="spawn-indicator"></div>

        <!-- Game over modal -->
        <div id="game-over" class="hidden">
            <div class="modal">
                <h1 id="result-title">Victory!</h1>
                <p id="result-stats">Towers destroyed: 0 | Units deployed: 0</p>
                <button id="play-again-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- DEVICE DETECTION ---
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isMobile = isIOS || isAndroid ||
            ('ontouchstart' in window && navigator.maxTouchPoints > 1) ||
            (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches);

        // --- VIEWPORT HEIGHT FIX ---
        function setVH() {
            const vh = window.visualViewport 
                ? window.visualViewport.height * 0.01 
                : window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setVH();
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', () => {
            setTimeout(setVH, 100);
            setTimeout(setVH, 300);
        });
        if (window.visualViewport) {

        // --- AUDIO & HAPTIC SYSTEM ---
        const AudioFX = {
            ctx: null,
            enabled: false,

            init() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.enabled = true;
            },

            vibrate(pattern = 10) {
                if ('vibrate' in navigator) {
                    navigator.vibrate(pattern);
                }
            },

            vibrate(pattern = 10) {
                if ('vibrate' in navigator) {
                    navigator.vibrate(pattern);
                }
            },

            play(type) {
                if (!this.ctx || !this.enabled) return;

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;

                switch(type) {
                    case 'attack':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                        gain.gain.setValueAtTime(0.08, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                        osc.start(); osc.stop(now + 0.15);
                        this.vibrate(15);
                        break;

                    case 'archer':
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(800, now);
                        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                        gain.gain.setValueAtTime(0.08, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        osc.start(); osc.stop(now + 0.1);
                        this.vibrate(8);
                        break;

                    case 'wizard':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                        osc.start(); osc.stop(now + 0.25);
                        this.vibrate([10, 20, 10]);
                        break;

                    case 'tower':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(); osc.stop(now + 0.3);
                        this.vibrate(20);
                        break;

                    case 'spawn':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                        gain.gain.setValueAtTime(0.08, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.15);
                        osc.start(); osc.stop(now + 0.15);
                        this.vibrate(25);
                        break;

                    case 'select':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(500, now);
                        gain.gain.setValueAtTime(0.05, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                        osc.start(); osc.stop(now + 0.08);
                        this.vibrate(10);
                        break;

                    case 'error':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(150, now);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        osc.start(); osc.stop(now + 0.2);
                        this.vibrate([30, 50, 30]);
                        break;

                    case 'victory':
                        this.playMelody([523, 659, 784, 1047], 0.15);
                        this.vibrate([50, 30, 50, 30, 100]);
                        break;

                    case 'defeat':
                        this.playMelody([400, 350, 300, 250], 0.2);
                        this.vibrate([100, 50, 100]);
                        break;
                }
            },

            playMelody(frequencies, duration) {
                frequencies.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                        osc.start();
                        osc.stop(this.ctx.currentTime + duration);
                    }, i * duration * 1000);
                });
            }
        };

        function createTower(x, z, side, isKing) {
            const size = isKing ? 2.5 : 2;
            const height = isKing ? 4.5 : 3.5;
            const geo = new THREE.BoxGeometry(size, height, size);
            const mat = new THREE.MeshStandardMaterial({ color: side === 'player' ? 0x2980b9 : 0xc0392b });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, height / 2, z);
            mesh.castShadow = true;

            scene.add(mesh);

            roof.position.y = height / 2 + 0.75;
            roof.rotation.y = Math.PI / 4;
            mesh.add(roof);

            // Health Bar
            const barGeo = new THREE.PlaneGeometry(2.5, 0.3);
            const barBg = new THREE.Mesh(barGeo, new THREE.MeshBasicMaterial({ color: 0x000000 }));
            const bar = new THREE.Mesh(barGeo, new THREE.MeshBasicMaterial({ color: 0x2ecc71 }));

            barBg.position.set(0, height / 2 + 2, 0);
            barBg.rotation.x = -Math.PI / 4;
            bar.position.set(0, height / 2 + 2, 0.01);
            bar.rotation.x = -Math.PI / 4;
            mesh.add(barBg);
            mesh.add(bar);

            const tower = {
                mesh,

                side,

                hp: isKing ? 800 : 500,

        // --- UNIT CLASS ---
        class Unit {
            constructor(type, x, z, side) {
                this.type = type;
                this.side = side;
                this.config = CONFIG.UNIT_TYPES[type];
                this.hp = this.config.hp;
                this.pos = new THREE.Vector3(x, 0, z);
                this.target = null;
                this.attackTimer = 0;

                this.mesh = createModel(type, side);
                this.mesh.position.copy(this.pos);
                // Enable shadows for all children
                this.mesh.traverse(child => { if (child.isMesh) child.castShadow = true; });
                scene.add(this.mesh);

                const barGeo = new THREE.PlaneGeometry(1, 0.15);
                const barMat = new THREE.MeshBasicMaterial({ color: 0x2ecc71 });
                this.bar = new THREE.Mesh(barGeo, barMat);
                this.bar.position.set(0, (type === 'giant' ? 2.2 : 1.5), 0);
                this.bar.rotation.x = -Math.PI / 4;
                this.mesh.add(this.bar);

                AudioFX.play('spawn');
            }

            update(dt) {
                if (this.hp <= 0) return;
                this.bar.scale.x = Math.max(0, this.hp / this.config.maxHp);

                this.findTarget();

                if (this.target) {
                    const targetPos = this.target.pos || this.target.position;
                    const dist = this.pos.distanceTo(targetPos);

                    if (dist <= this.config.range) {
                        this.attackTimer += dt;
                        if (this.attackTimer >= 1000) {
                            // Splash damage for wizard
                            if (this.config.splash) {
                                const splashRadius = 2.5;
                                const enemies = this.side === 'player' ? state.aiUnits : state.playerUnits;
                                enemies.forEach(e => {
                                    const d = this.target.pos ? this.target.pos.distanceTo(e.pos) : 999;
                                    if (d < splashRadius) {
                                        e.hp -= this.config.dmg * (1 - d / splashRadius);
                                        this.showHitEffect(e.mesh);
                                    }
                                });
                                // Also damage the main target
                                this.target.hp -= this.config.dmg;
                                this.showSplashEffect(this.target.pos || this.target.position);
                            } else {
                                this.target.hp -= this.config.dmg;
                            }
                            
                            this.attackTimer = 0;

                            // Audio based on unit
                            if (this.type === 'wizard') {
                                AudioFX.play('wizard');
                            } else if (this.type === 'archer') {
                                AudioFX.play('archer');
                            } else {
                                AudioFX.play('attack');
                            }

                            // Hit flash
                            this.showHitEffect(this.target.mesh);
                            
                            // Show damage number
                            this.showDamageNumber(this.target.pos || this.target.position, this.config.dmg);
                        }
                    } else {
                        const dir = new THREE.Vector3().subVectors(targetPos, this.pos).normalize();
                        this.pos.add(dir.multiplyScalar(this.config.speed * dt / 1000));
                        this.mesh.position.copy(this.pos);
                        // Simple rotation towards target
                        this.mesh.lookAt(targetPos.x, this.mesh.position.y, targetPos.z);
                    }
                }
            }

            findTarget() {
                let closest = null;
                let minDist = Infinity;
                const enemies = this.side === 'player' ? state.aiUnits : state.playerUnits;
                const enemyTowers = state.towers.filter(t => t.side !== this.side);

                if (this.config.buildingOnly) {
                    enemyTowers.forEach(t => {
                        const d = this.pos.distanceTo(t.position);
                        if (d < minDist) { minDist = d; closest = t; }
                    });
                } else {
                    [...enemies, ...enemyTowers].forEach(e => {
                        const d = this.pos.distanceTo(e.pos || e.position);
                        if (d < minDist) { minDist = d; closest = e; }
                    });
                }
                this.target = closest;
            }

            showHitEffect(mesh) {
                if (!mesh) return;
                mesh.traverse(child => {
                    if (child.isMesh && child.material) {
                        const oldCol = child.material.color.clone();
                        child.material.color.set(0xffffff);
                        setTimeout(() => { 
                            if (child.material) child.material.color.copy(oldCol); 
                        }, 100);
                    }
                });
            }

            showSplashEffect(pos) {
                const geo = new THREE.RingGeometry(0.3, 2, 16);
                const mat = new THREE.MeshBasicMaterial({ 
                    color: 0xff6b35, 
                    transparent: true, 
                    opacity: 0.7,
                    side: THREE.DoubleSide
                });
                const ring = new THREE.Mesh(geo, mat);
                ring.rotation.x = -Math.PI / 2;
                ring.position.set(pos.x, 0.2, pos.z);
                scene.add(ring);
                
                let scale = 1;
                const animateSplash = () => {
                    scale += 0.15;
                    ring.scale.set(scale, scale, scale);
                    ring.material.opacity -= 0.08;
                    if (ring.material.opacity > 0) {
                        requestAnimationFrame(animateSplash);
                    } else {
                        scene.remove(ring);
                        ring.geometry.dispose();
                        ring.material.dispose();
                    }
                };
                animateSplash();
            }

            showDamageNumber(pos, damage) {
                const div = document.createElement('div');
                div.className = 'damage-number';
                div.textContent = '-' + Math.round(damage);
                
                // Convert 3D position to screen position
                const vector = new THREE.Vector3(pos.x, pos.y + 2, pos.z);
                vector.project(camera);
                
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;
                
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                document.body.appendChild(div);
                
                setTimeout(() => div.remove(), 1000);
            }

            destroy() {
                scene.remove(this.mesh);
            }
        }

        // --- INPUT HANDLING (Drag & Drop + Tap Support) ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        const ghostCard = document.getElementById('ghost-card');
        const rangeIndicator = document.getElementById('range-indicator');
        const spawnIndicator = document.getElementById('spawn-indicator');
        const canvas = document.getElementById('bg');

        // Drag state
        let isDragging = false;
        let dragCard = null;
        let dragType = null;
        let dragTouchId = null;
        let dragStartPos = { x: 0, y: 0 };
        let lastTrailTime = 0;

        // Get world position from screen coordinates
        function getWorldPosition(clientX, clientY) {
            pointer.x = (clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, target);
            return target;
        }

        // Check if position is valid for spawning (player's side)
        function isValidSpawnPosition(point) {
            return point && point.z > 0 && point.z < 15 && Math.abs(point.x) < 11;
        }

        // Update ghost card position
        function updateGhostCard(clientX, clientY) {
            ghostCard.style.left = clientX + 'px';
            ghostCard.style.top = clientY + 'px';
        }

        // Update range indicator
        function updateRangeIndicator(clientX, clientY, valid) {
            rangeIndicator.style.left = clientX + 'px';
            rangeIndicator.style.top = clientY + 'px';
            rangeIndicator.classList.add('visible');
            
            const circle = rangeIndicator.querySelector('.range-circle');
            if (valid) {
                circle.classList.remove('invalid');
            } else {
                circle.classList.add('invalid');
            }
        }

        // Create trail effect while dragging
        function createTrail(clientX, clientY) {
            const now = Date.now();
            if (now - lastTrailTime < 30) return;
            lastTrailTime = now;

            const trail = document.createElement('div');
            trail.className = 'deploy-trail';
            trail.style.left = clientX + 'px';
            trail.style.top = clientY + 'px';
            document.body.appendChild(trail);
            
            setTimeout(() => trail.remove(), 300);
        }

        // Start dragging
        function startDrag(cardElement, clientX, clientY, touchId = null) {
            const type = cardElement.dataset.type;
            const cost = parseInt(cardElement.dataset.cost);
            
            // Check if enough elixir
            if (state.elixir < cost) {
                AudioFX.play('error');
                cardElement.classList.add('haptic-flash');
                setTimeout(() => cardElement.classList.remove('haptic-flash'), 100);
                return false;
            }

            isDragging = true;
            dragCard = cardElement;
            dragType = type;
            dragTouchId = touchId;
            dragStartPos = { x: clientX, y: clientY };

            // Update ghost card content
            const config = CONFIG.UNIT_TYPES[type];
            ghostCard.querySelector('.card-icon').textContent = config.icon;
            ghostCard.querySelector('.card-name').textContent = type.charAt(0).toUpperCase() + type.slice(1);
            
            // Show ghost card
            updateGhostCard(clientX, clientY);
            ghostCard.classList.add('visible', 'dragging');
            
            // Mark original card as dragging
            cardElement.classList.add('dragging');
            
            // Deselect any selected card
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            state.selectedCard = null;

            // Update instruction
            document.getElementById('instruction').textContent = 'Drop on the field to deploy!';

            AudioFX.play('select');
            AudioFX.vibrate(15);

            return true;
        }

        // Update drag position
        function updateDrag(clientX, clientY) {
            if (!isDragging) return;

            updateGhostCard(clientX, clientY);
            
            const point = getWorldPosition(clientX, clientY);
            const valid = isValidSpawnPosition(point);
            
            updateRangeIndicator(clientX, clientY, valid);
            createTrail(clientX, clientY);

            // Update spawn indicator
            spawnIndicator.style.left = clientX + 'px';
            spawnIndicator.style.top = clientY + 'px';
            spawnIndicator.classList.add('visible');
            
            if (valid) {
                spawnIndicator.classList.remove('invalid');
            } else {
                spawnIndicator.classList.add('invalid');
            }
        }

        // End drag and potentially spawn
        function endDrag(clientX, clientY) {
            if (!isDragging) return;

            const point = getWorldPosition(clientX, clientY);
            const valid = isValidSpawnPosition(point);

            if (valid && dragType) {
                // Spawn the unit
                if (spawnUnit(dragType, point.x, point.z)) {
                    AudioFX.vibrate(25);
                }
            } else if (dragType) {
                // Invalid position
                AudioFX.play('error');
                AudioFX.vibrate([20, 30, 20]);
            }

            // Clean up drag state
            cancelDrag();
        }

        // Cancel drag without spawning
        function cancelDrag() {
            isDragging = false;
            
            if (dragCard) {
                dragCard.classList.remove('dragging');
            }
            
            dragCard = null;
            dragType = null;
            dragTouchId = null;

            ghostCard.classList.remove('visible', 'dragging');
            rangeIndicator.classList.remove('visible');
            spawnIndicator.classList.remove('visible');

            document.getElementById('instruction').textContent = 'Drag cards to the field to deploy';
        }

        // Spawn unit at position
        function spawnUnit(type, x, z) {
            const cost = CONFIG.UNIT_TYPES[type].cost;
            if (state.elixir < cost) return false;
            
            const unit = new Unit(type, x, z, 'player');
            state.playerUnits.push(unit);
            state.elixir -= cost;
            state.unitsDeployed++;
            
            showSpawnEffect(x, z);
            AudioFX.play('spawn');
            
            return true;
        }

        // Show spawn effect
        function showSpawnEffect(x, z) {
            // Ring effect
            const geo = new THREE.RingGeometry(0.5, 2, 24);
            const mat = new THREE.MeshBasicMaterial({ 
                color: 0xf1c40f, 
                transparent: true, 
                opacity: 0.9,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(geo, mat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(x, 0.15, z);
            scene.add(ring);
            
            // Second ring (delayed)
            const geo2 = new THREE.RingGeometry(0.3, 1.5, 24);
            const ring2 = new THREE.Mesh(geo2, mat.clone());
            ring2.rotation.x = -Math.PI / 2;
            ring2.position.set(x, 0.1, z);
            scene.add(ring2);

            let scale = 1;
            let scale2 = 0.5;
            
            const animate = () => {
                scale += 0.12;
                scale2 += 0.15;
                
                ring.scale.set(scale, scale, scale);
                ring.material.opacity -= 0.06;
                
                ring2.scale.set(scale2, scale2, scale2);
                ring2.material.opacity -= 0.05;
                
                if (ring.material.opacity > 0 || ring2.material.opacity > 0) {
                    requestAnimationFrame(animate);
                } else {
                    scene.remove(ring);
                    scene.remove(ring2);
                    ring.geometry.dispose();
                    ring.material.dispose();
                    ring2.geometry.dispose();
                    ring2.material.dispose();
                }
            };
            animate();

            // Particle burst
            for (let i = 0; i < 8; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15, 6, 6),
                    new THREE.MeshBasicMaterial({ color: 0xf1c40f })
                );
                const angle = (i / 8) * Math.PI * 2;
                particle.position.set(x, 0.5, z);
                scene.add(particle);

                const vel = {
                    x: Math.cos(angle) * 0.15,
                    y: 0.2,
                    z: Math.sin(angle) * 0.15
                };

                const animateParticle = () => {
                    particle.position.x += vel.x;
                    particle.position.y += vel.y;
                    particle.position.z += vel.z;
                    vel.y -= 0.015;
                    particle.scale.multiplyScalar(0.95);

                    if (particle.position.y > 0) {
                        requestAnimationFrame(animateParticle);
                    } else {
                        scene.remove(particle);
                        particle.geometry.dispose();
                        particle.material.dispose();
                    }
                };
                animateParticle();
            }
        }

        // ===== TOUCH EVENTS FOR CARDS =====
        document.querySelectorAll('.card').forEach(card => {
            // Touch start - begin drag
            card.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                startDrag(card, touch.clientX, touch.clientY, touch.identifier);
            }, { passive: false });
        });

        // Global touch move
        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            
            for (let touch of e.changedTouches) {
                if (touch.identifier === dragTouchId) {
                    e.preventDefault();
                    updateDrag(touch.clientX, touch.clientY);
                    break;
                }
            }
        }, { passive: false });

        // Global touch end
        document.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            
            for (let touch of e.changedTouches) {
                if (touch.identifier === dragTouchId) {
                    endDrag(touch.clientX, touch.clientY);
                    break;
                }
            }
        }, { passive: false });

        document.addEventListener('touchcancel', (e) => {
            if (isDragging) {
                cancelDrag();
            }
        }, { passive: false });

        // ===== MOUSE EVENTS FOR CARDS (PC) =====
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startDrag(card, e.clientX, e.clientY);
            });
        });

        // Global mouse move
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            updateDrag(e.clientX, e.clientY);
        });

        // Global mouse up
        document.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            endDrag(e.clientX, e.clientY);
        });

        // ===== ALTERNATIVE: TAP TO SELECT, TAP TO DEPLOY =====
        // For users who prefer tap instead of drag

        // Card selection (double tap or long press alternative)
        let lastTapTime = 0;
        let lastTapCard = null;

        function handleCardTap(cardElement, clientX, clientY) {
            const now = Date.now();
            const type = cardElement.dataset.type;
            const cost = parseInt(cardElement.dataset.cost);

            // Check elixir
            if (state.elixir < cost) {
                AudioFX.play('error');
                return;
            }

            // Double tap detection for selection mode
            if (lastTapCard === cardElement && now - lastTapTime < 300) {
                // Double tap - select card
                selectCardForTap(cardElement);
                lastTapCard = null;
                return;
            }

            lastTapTime = now;
            lastTapCard = cardElement;
        }

        function selectCardForTap(cardElement) {
            const type = cardElement.dataset.type;
            
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            cardElement.classList.add('selected');
            state.selectedCard = type;
            
            document.getElementById('instruction').textContent = 'Tap the field to deploy ' + type.toUpperCase();
            AudioFX.play('select');
        }

        // Canvas tap for deployment when card is selected
        canvas.addEventListener('click', (e) => {
            if (isDragging || state.isGameOver) return;
            
            // If a card is selected via tap, deploy it
            if (state.selectedCard) {
                const point = getWorldPosition(e.clientX, e.clientY);
                
                if (isValidSpawnPosition(point)) {
                    if (spawnUnit(state.selectedCard, point.x, point.z)) {
                        // Deselect after spawn
                        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                        state.selectedCard = null;
                        document.getElementById('instruction').textContent = 'Drag cards to the field to deploy';
                    }
                } else {
                    AudioFX.play('error');
                }
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            if (isDragging || state.isGameOver) return;
            
            // If a card is selected via double-tap, deploy it
            if (state.selectedCard) {
                e.preventDefault();
                const touch = e.changedTouches[0];
                const point = getWorldPosition(touch.clientX, touch.clientY);
                
                if (isValidSpawnPosition(point)) {
                    if (spawnUnit(state.selectedCard, point.x, point.z)) {
                        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                        state.selectedCard = null;
                        document.getElementById('instruction').textContent = 'Drag cards to the field to deploy';
                    }
                } else {
                    AudioFX.play('error');
                    AudioFX.vibrate([20, 30, 20]);
                }
            }
        }, { passive: false });

        // Right click to cancel
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (isDragging) {
                cancelDrag();
            }
            if (state.selectedCard) {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                state.selectedCard = null;
                document.getElementById('instruction').textContent = 'Drag cards to the field to deploy';
            }
        });

        // Escape to cancel
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                cancelDrag();
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                state.selectedCard = null;
                document.getElementById('instruction').textContent = 'Drag cards to the field to deploy';
            }
            
            // Number keys to quick-select cards
            if (e.key >= '1' && e.key <= '4') {
                const cardIndex = parseInt(e.key) - 1;
                const cards = document.querySelectorAll('#main-cards .card');
                if (cards[cardIndex]) {
                    selectCardForTap(cards[cardIndex]);
                }
            }
        });

        // Play Again button
        document.getElementById('play-again-btn').addEventListener('click', () => location.reload());
        document.getElementById('play-again-btn').addEventListener('touchend', (e) => {
            e.preventDefault();
            location.reload();
        });

        // --- GAME LOOP ---
        function animate() {
            if (state.isGameOver) return;
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = now - state.lastTime;
            state.lastTime = now;

            // Game timer
            state.gameTime -= dt / 1000;
            if (state.gameTime <= 0) {
                state.gameTime = 0;
                // Time's up - check who has more tower HP
                const playerHP = state.towers.filter(t => t.side === 'player').reduce((sum, t) => sum + t.hp, 0);
                const aiHP = state.towers.filter(t => t.side === 'ai').reduce((sum, t) => sum + t.hp, 0);
                endGame(playerHP > aiHP ? 'Victory!' : (playerHP < aiHP ? 'Defeat' : 'Draw!'));
                return;
            }

            // Elixir regeneration
            state.elixir = Math.min(CONFIG.ELIXIR_MAX, state.elixir + (CONFIG.ELIXIR_GROWTH_RATE * dt / 1000));
            updateUI();

            // AI Spawning
            state.aiSpawnTimer += dt;
            if (state.aiSpawnTimer > 7000) {
                const types = ['knight', 'archer', 'giant'];
                const type = types[Math.floor(Math.random() * types.length)];
                const unit = new Unit(type, (Math.random() - 0.5) * 12, -14, 'ai');
                state.aiUnits.push(unit);
                state.aiSpawnTimer = 0;
            }

            // Update & Cleanup Units
            [state.playerUnits, state.aiUnits].forEach(list => {
                for (let i = list.length - 1; i >= 0; i--) {
                    list[i].update(dt);
                    if (list[i].hp <= 0) {
                        list[i].destroy();
                        list.splice(i, 1);
                    }
                }
            });

            // Update Towers
            for (let i = state.towers.length - 1; i >= 0; i--) {
                const t = state.towers[i];
                t.bar.scale.x = Math.max(0, t.hp / t.maxHp);

                t.attackTimer += dt;
                if (t.attackTimer >= 1500) {
                    const enemies = t.side === 'player' ? state.aiUnits : state.playerUnits;
                    const closest = enemies.find(e => t.position.distanceTo(e.pos) < t.range);
                    if (closest) {
                        closest.hp -= t.dmg;
                        t.attackTimer = 0;
                        AudioFX.play('tower');
                    }
                }

                if (t.hp <= 0) {
                    scene.remove(t.mesh);
                    
                    // Track destroyed towers
                    if (t.side === 'ai') {
                        state.towersDestroyed++;
                    }
                    
                    if (t.isKing) {
                        endGame(t.side === 'ai' ? 'Victory!' : 'Defeat');
                    }
                    state.towers.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        function updateUI() {
            // Elixir bar
            const elixirPercent = (state.elixir / CONFIG.ELIXIR_MAX * 100);
            document.getElementById('elixir-bar').style.width = elixirPercent + '%';
            document.getElementById('elixir-text').innerText = Math.floor(state.elixir) + '/' + CONFIG.ELIXIR_MAX;
            
            // Timer
            const mins = Math.floor(state.gameTime / 60);
            const secs = Math.floor(state.gameTime % 60);
            document.getElementById('timer-text').innerText = mins + ':' + secs.toString().padStart(2, '0');
            
            // Cards availability
            document.querySelectorAll('.card').forEach(card => {
                const cost = parseInt(card.dataset.cost);
                if (state.elixir < cost) {
                    card.classList.add('disabled');
                } else {
                    card.classList.remove('disabled');
                }
            });
            
            // Next card
            document.querySelector('#next-card .card-icon').textContent = CONFIG.UNIT_TYPES[state.nextCard].icon;
        }

        function endGame(result) {
            state.isGameOver = true;
            
            const isVictory = result === 'Victory!';
            document.getElementById('result-title').innerText = result;
            document.getElementById('result-stats').innerText = 
                `Towers destroyed: ${state.towersDestroyed} | Units deployed: ${state.unitsDeployed}`;
            document.getElementById('game-over').classList.remove('hidden');
            
            // Play sound
            AudioFX.play(isVictory ? 'victory' : 'defeat');
            
            // Deselect any selected card
            deselectCard();
        }

        function handleResize() {
            const w = window.visualViewport ? window.visualViewport.width : window.innerWidth;
            const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const aspect = w / h;
            
            // Adjust camera for different aspect ratios
            let cameraD = d;
            if (aspect < 1) {
                // Portrait - zoom out more
                cameraD = d * 1.3;
            } else if (aspect > 2) {
                // Ultra-wide - zoom in
                cameraD = d * 0.9;
            }
            
            camera.left = -cameraD * aspect;
            camera.right = cameraD * aspect;
            camera.top = cameraD;
            camera.bottom = -cameraD;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            setVH();
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', () => {
            setTimeout(handleResize, 100);
            setTimeout(handleResize, 300);
        });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', handleResize);
        }

        // Initial resize
        handleResize();

        createField();
        animate();
    </script>
</body>
