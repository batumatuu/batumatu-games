<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale Prototype | Antigravity</title>
    <style>
        :root {
            --primary-blue: #3498db;
            --primary-red: #e74c3c;
            --primary-gold: #f1c40f;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: var(--font-main);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #bg {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        #stats {
            display: flex;
            justify-content: center;
            pointer-events: auto;
        }

        #elixir-container {
            width: 300px;
            height: 25px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12.5px;
            overflow: hidden;
            position: relative;
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        #elixir-bar {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #9b59b6, #8e44ad);
            transition: width 0.1s linear;
        }

        #elixir-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        #cards-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            justify-content: center;
            pointer-events: auto;
            margin-bottom: 20px;
        }

        .cards-row {
            display: flex;
            gap: 15px;
        }

        #instruction {
            color: var(--primary-gold);
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .card {
            width: 100px;
            height: 140px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            user-select: none;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: var(--primary-gold);
        }

        .card:active {
            cursor: grabbing;
            transform: scale(0.95) translateY(-10px);
        }

        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-name {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .card-cost {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #9b59b6;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid white;
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
        }

        #game-over.hidden {
            display: none;
        }

        .modal {
            background: #2c3e50;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid var(--primary-gold);
            color: white;
        }

        .modal h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .modal button {
            padding: 12px 30px;
            font-size: 18px;
            background: var(--primary-gold);
            border: none;
            border-radius: 8px;
            color: #2c3e50;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal button:hover {
            transform: scale(1.1);
        }

        .dragging {
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="stats">
                <div id="elixir-container">
                    <div id="elixir-bar"></div>
                    <span id="elixir-text">5</span>
                </div>
            </div>

            <div id="cards-container">
                <div id="instruction">Drag cards to the field to spawn units</div>
                <div class="cards-row">
                    <div class="card" id="card-knight" draggable="true" data-type="knight" data-cost="3">
                        <div class="card-icon">⚔️</div>
                        <div class="card-info">
                            <span class="card-name">Knight</span>
                            <span class="card-cost">3</span>
                        </div>
                    </div>
                    <div class="card" id="card-archer" draggable="true" data-type="archer" data-cost="2">
                        <div class="card-icon">🏹</div>
                        <div class="card-info">
                            <span class="card-name">Archer</span>
                            <span class="card-cost">2</span>
                        </div>
                    </div>
                    <div class="card" id="card-giant" draggable="true" data-type="giant" data-cost="5">
                        <div class="card-icon">👑</div>
                        <div class="card-info">
                            <span class="card-name">Giant</span>
                            <span class="card-cost">5</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="game-over" class="hidden">
                <div class="modal">
                    <h1 id="result-title">Victory!</h1>
                    <button onclick="location.reload()">Play Again</button>
                </div>
            </div>
        </div>
        <canvas id="bg"></canvas>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // Mocking Cannon-es as we might not need it for this simple prototype physics
        // or we can load it from a script tag if necessary. 
        // For now, let's use a simpler movement logic without a heavy engine.

        // --- CONFIGURATION ---
        const CONFIG = {
            ELIXIR_MAX: 10,
            ELIXIR_GROWTH_RATE: 0.5, // Faster elixir (0.5 units per second)
            AI_SPAWN_INTERVAL: [5000, 8000],
            UNIT_TYPES: {
                knight: { hp: 120, maxHp: 120, dmg: 18, range: 1.5, speed: 2, cost: 3, color: 0x3498db },
                archer: { hp: 80, maxHp: 80, dmg: 12, range: 7, speed: 1.8, cost: 2, color: 0xe67e22 },
                giant: { hp: 350, maxHp: 350, dmg: 30, range: 2, speed: 1.2, cost: 5, color: 0x27ae60, buildingOnly: true }
            }
        };

        // --- AUDIO SYSTEM ---
        const AudioFX = {
            ctx: null,
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;
                if (type === 'attack') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start();
                    osc.stop(now + 0.15);
                } else if (type === 'archer') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start();
                    osc.stop(now + 0.1);
                } else if (type === 'tower') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start();
                    osc.stop(now + 0.3);
                } else if (type === 'spawn') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.2);
                    osc.start();
                    osc.stop(now + 0.2);
                }
            }
        };

        // Initialize audio on first click
        window.addEventListener('mousedown', () => AudioFX.init(), { once: true });

        // --- GAME STATE ---
        const state = {
            elixir: 5,
            lastTime: performance.now(),
            playerUnits: [],
            aiUnits: [],
            towers: [],
            isGameOver: false,
            aiSpawnTimer: 0
        };

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e272e);

        const aspect = window.innerWidth / window.innerHeight;
        const d = 15;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
        camera.position.set(25, 25, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.4);
        directionalLight.position.set(15, 30, 20);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.left = -25;
        directionalLight.shadow.camera.right = 25;
        directionalLight.shadow.camera.top = 25;
        directionalLight.shadow.camera.bottom = -25;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        scene.add(directionalLight);

        // --- FIELD CREATION ---
        function createField() {
            // Ground
            const groundGeo = new THREE.PlaneGeometry(28, 38);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x44bd32 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // River
            const riverGeo = new THREE.PlaneGeometry(28, 4);
            const riverMat = new THREE.MeshStandardMaterial({ color: 0x00a8ff, transparent: true, opacity: 0.7 });
            const river = new THREE.Mesh(riverGeo, riverMat);
            river.rotation.x = -Math.PI / 2;
            river.position.y = 0.05;
            scene.add(river);

            // Bridges
            const bridgeGeo = new THREE.BoxGeometry(5, 0.4, 6);
            const bridgeMat = new THREE.MeshStandardMaterial({ color: 0x7f8c8d });

            const bridgeLeft = new THREE.Mesh(bridgeGeo, bridgeMat);
            bridgeLeft.position.set(-7, 0.2, 0);
            scene.add(bridgeLeft);

            const bridgeRight = new THREE.Mesh(bridgeGeo, bridgeMat);
            bridgeRight.position.set(7, 0.2, 0);
            scene.add(bridgeRight);

            // Towers
            createTower(-7, 10, 'player', false);
            createTower(7, 10, 'player', false);
            createTower(0, 14, 'player', true);

            createTower(-7, -10, 'ai', false);
            createTower(7, -10, 'ai', false);
            createTower(0, -14, 'ai', true);

            // Decorative Trees
            spawnTree(-12, 8);
            spawnTree(12, 8);
            spawnTree(-12, -8);
            spawnTree(12, -8);
        }

        function spawnTree(x, z) {
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 1);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x795548 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, 0.5, z);
            trunk.castShadow = true;
            scene.add(trunk);

            const leafGeo = new THREE.ConeGeometry(1, 2, 8);
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x27ae60 });
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.set(x, 2, z);
            leaf.castShadow = true;
            scene.add(leaf);
        }

        function createModel(type, side) {
            const group = new THREE.Group();
            const color = side === 'player' ? CONFIG.UNIT_TYPES[type].color : 0xe74c3c;
            const mat = new THREE.MeshStandardMaterial({ color: color });

            if (type === 'knight') {
                // Body
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.8, 0.6), mat);
                body.position.y = 0.4;
                group.add(body);
                // Head/Helmet
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xbdc3c7 }));
                head.position.y = 1.05;
                group.add(head);
                // Sword
                const sword = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8), new THREE.MeshStandardMaterial({ color: 0xdcdde1 }));
                sword.rotation.z = Math.PI / 2.5;
                sword.position.set(0.5, 0.5, 0.2);
                group.add(sword);
                // Shield
                const shield = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.5), new THREE.MeshStandardMaterial({ color: 0x2c3e50 }));
                shield.position.set(-0.4, 0.4, 0.1);
                group.add(shield);
            } else if (type === 'archer') {
                // Body (slimmer)
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.4), mat);
                body.position.y = 0.4;
                group.add(body);
                // Hood
                const hood = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.6), mat);
                hood.position.y = 0.9;
                group.add(hood);
                // Bow
                const bow = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.03, 8, 12, Math.PI), new THREE.MeshStandardMaterial({ color: 0x795548 }));
                bow.rotation.y = Math.PI / 2;
                bow.position.set(0.4, 0.5, 0);
                group.add(bow);
            } else if (type === 'giant') {
                // Massive Body
                const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 1.0), mat);
                body.position.y = 0.7;
                group.add(body);
                // Big Arm
                const armRight = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.0, 0.4), mat);
                armRight.position.set(0.8, 0.7, 0);
                group.add(armRight);
                const armLeft = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.0, 0.4), mat);
                armLeft.position.set(-0.8, 0.7, 0);
                group.add(armLeft);
                // Head
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
                head.position.y = 1.6;
                group.add(head);
            }
            return group;
        }

        function createTower(x, z, side, isKing) {
            const size = isKing ? 2.5 : 2;
            const height = isKing ? 4.5 : 3.5;
            const geo = new THREE.BoxGeometry(size, height, size);
            const mat = new THREE.MeshStandardMaterial({ color: side === 'player' ? 0x2980b9 : 0xc0392b });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, height / 2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            // Roof (more detailed tower)
            const roofGeo = new THREE.ConeGeometry(size * 0.8, 1.5, 4);
            const roof = new THREE.Mesh(roofGeo, new THREE.MeshStandardMaterial({ color: 0x34495e }));
            roof.position.y = height / 2 + 0.75;
            roof.rotation.y = Math.PI / 4;
            mesh.add(roof);

            // Health Bar
            const barGeo = new THREE.PlaneGeometry(2.5, 0.3);
            const barBg = new THREE.Mesh(barGeo, new THREE.MeshBasicMaterial({ color: 0x000000 }));
            const bar = new THREE.Mesh(barGeo, new THREE.MeshBasicMaterial({ color: 0x2ecc71 }));

            barBg.position.set(0, height / 2 + 2, 0);
            barBg.rotation.x = -Math.PI / 4;
            bar.position.set(0, height / 2 + 2, 0.01);
            bar.rotation.x = -Math.PI / 4;
            mesh.add(barBg);
            mesh.add(bar);

            const tower = {
                mesh,
                bar,
                side,
                isKing,
                hp: isKing ? 800 : 500,
                maxHp: isKing ? 800 : 500,
                range: 9,
                dmg: 25,
                attackTimer: 0,
                position: new THREE.Vector3(x, 0, z)
            };
            state.towers.push(tower);
        }

        // --- UNIT CLASS ---
        class Unit {
            constructor(type, x, z, side) {
                this.type = type;
                this.side = side;
                this.config = CONFIG.UNIT_TYPES[type];
                this.hp = this.config.hp;
                this.pos = new THREE.Vector3(x, 0, z);
                this.target = null;
                this.attackTimer = 0;

                this.mesh = createModel(type, side);
                this.mesh.position.copy(this.pos);
                // Enable shadows for all children
                this.mesh.traverse(child => { if (child.isMesh) child.castShadow = true; });
                scene.add(this.mesh);

                const barGeo = new THREE.PlaneGeometry(1, 0.15);
                const barMat = new THREE.MeshBasicMaterial({ color: 0x2ecc71 });
                this.bar = new THREE.Mesh(barGeo, barMat);
                this.bar.position.set(0, (type === 'giant' ? 2.2 : 1.5), 0);
                this.bar.rotation.x = -Math.PI / 4;
                this.mesh.add(this.bar);

                AudioFX.play('spawn');
            }

            update(dt) {
                if (this.hp <= 0) return;
                this.bar.scale.x = Math.max(0, this.hp / this.config.maxHp);

                this.findTarget();

                if (this.target) {
                    const targetPos = this.target.pos || this.target.position;
                    const dist = this.pos.distanceTo(targetPos);

                    if (dist <= this.config.range) {
                        this.attackTimer += dt;
                        if (this.attackTimer >= 1000) {
                            this.target.hp -= this.config.dmg;
                            this.attackTimer = 0;

                            // Audio based on unit
                            AudioFX.play(this.type === 'archer' ? 'archer' : 'attack');

                            // Hit flash
                            const targetMesh = this.target.mesh || this.target.mesh; // tower or unit
                            targetMesh.traverse(child => {
                                if (child.isMesh && child.material) {
                                    const oldCol = child.material.color.clone();
                                    child.material.color.set(0xffffff);
                                    setTimeout(() => { if (child.material) child.material.color.copy(oldCol); }, 100);
                                }
                            });
                        }
                    } else {
                        const dir = new THREE.Vector3().subVectors(targetPos, this.pos).normalize();
                        this.pos.add(dir.multiplyScalar(this.config.speed * dt / 1000));
                        this.mesh.position.copy(this.pos);
                        // Simple rotation towards target
                        this.mesh.lookAt(targetPos.x, this.mesh.position.y, targetPos.z);
                    }
                }
            }

            findTarget() {
                let closest = null;
                let minDist = Infinity;
                const enemies = this.side === 'player' ? state.aiUnits : state.playerUnits;
                const enemyTowers = state.towers.filter(t => t.side !== this.side);

                if (this.config.buildingOnly) {
                    enemyTowers.forEach(t => {
                        const d = this.pos.distanceTo(t.position);
                        if (d < minDist) { minDist = d; closest = t; }
                    });
                } else {
                    [...enemies, ...enemyTowers].forEach(e => {
                        const d = this.pos.distanceTo(e.pos || e.position);
                        if (d < minDist) { minDist = d; closest = e; }
                    });
                }
                this.target = closest;
            }

            destroy() {
                scene.remove(this.mesh);
            }
        }

        // --- INPUT HANDLING ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let activeDrag = null;

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('dragstart', (e) => {
                const cost = parseInt(card.dataset.cost);
                if (state.elixir < cost) { e.preventDefault(); return; }
                activeDrag = card.dataset.type;
                card.classList.add('dragging');
            });
            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
                activeDrag = null;
            });
        });

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            if (!activeDrag) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children);
            if (intersects.length > 0) {
                const point = intersects[0].point;
                if (point.z > 0 && point.z < 15 && Math.abs(point.x) < 11) {
                    const unit = new Unit(activeDrag, point.x, point.z, 'player');
                    state.playerUnits.push(unit);
                    state.elixir -= CONFIG.UNIT_TYPES[activeDrag].cost;
                }
            }
        });

        // --- GAME LOOP ---
        function animate() {
            if (state.isGameOver) return;
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = now - state.lastTime;
            state.lastTime = now;

            // Updated Elixir logic
            state.elixir = Math.min(CONFIG.ELIXIR_MAX, state.elixir + (CONFIG.ELIXIR_GROWTH_RATE * dt / 1000));
            updateUI();

            // AI Spawning
            state.aiSpawnTimer += dt;
            if (state.aiSpawnTimer > 7000) {
                const types = ['knight', 'archer', 'giant'];
                const type = types[Math.floor(Math.random() * types.length)];
                const unit = new Unit(type, (Math.random() - 0.5) * 12, -14, 'ai');
                state.aiUnits.push(unit);
                state.aiSpawnTimer = 0;
            }

            // Update & Cleanup Units
            [state.playerUnits, state.aiUnits].forEach(list => {
                for (let i = list.length - 1; i >= 0; i--) {
                    list[i].update(dt);
                    if (list[i].hp <= 0) {
                        list[i].destroy();
                        list.splice(i, 1);
                    }
                }
            });

            // Update Towers
            for (let i = state.towers.length - 1; i >= 0; i--) {
                const t = state.towers[i];
                t.bar.scale.x = Math.max(0, t.hp / t.maxHp);

                t.attackTimer += dt;
                if (t.attackTimer >= 1500) {
                    const enemies = t.side === 'player' ? state.aiUnits : state.playerUnits;
                    const closest = enemies.find(e => t.position.distanceTo(e.pos) < t.range);
                    if (closest) {
                        closest.hp -= t.dmg;
                        t.attackTimer = 0;
                        AudioFX.play('tower');
                    }
                }

                if (t.hp <= 0) {
                    scene.remove(t.mesh);
                    if (t.isKing) endGame(t.side === 'ai' ? 'Victory!' : 'Defeat');
                    state.towers.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        function updateUI() {
            document.getElementById('elixir-bar').style.width = (state.elixir / CONFIG.ELIXIR_MAX * 100) + '%';
            document.getElementById('elixir-text').innerText = Math.floor(state.elixir);
            document.querySelectorAll('.card').forEach(card => {
                const cost = parseInt(card.dataset.cost);
                if (state.elixir < cost) card.classList.add('disabled');
                else card.classList.remove('disabled');
            });
        }

        function endGame(result) {
            state.isGameOver = true;
            document.getElementById('result-title').innerText = result;
            document.getElementById('game-over').classList.remove('hidden');
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        createField();
        animate();
    </script>
</body>

</html>
