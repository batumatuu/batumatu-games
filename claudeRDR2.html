<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RDR2 Web - Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { overflow: hidden; background: #FF6B35; font-family: sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* Ortak HUD */
        #hud { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        .bar-container { width: 200px; height: 20px; background: #222; border: 2px solid #fff; margin-bottom: 10px; }
        .bar-fill { height: 100%; }
        #healthBar { background: red; width: 100%; }
        #ammoBar { background: gold; width: 100%; }
        #score { position: absolute; top: 20px; right: 20px; color: gold; font-size: 24px; font-weight: bold; z-index: 10; pointer-events: none; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; background: white; border-radius: 50%;
            z-index: 10; pointer-events: none; mix-blend-mode: difference;
        }

        #instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: white; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px;
            z-index: 10; pointer-events: none; text-align: center;
        }

        /* MOBİL KONTROLLER */
        #mobileControls { display: none; }
        
        .joy-bg {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid rgba(255,255,255,0.5);
            z-index: 20;
        }
        .joy-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%);
        }

        .action-btns { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 15px; z-index: 20; }
        .btn {
            width: 60px; height: 60px; background: rgba(0,0,0,0.5); border: 2px solid white;
            border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px; text-transform: uppercase;
        }
        .btn:active { background: rgba(255,255,255,0.5); }
        #btnShoot { width: 70px; height: 70px; background: rgba(220, 20, 60, 0.7); font-size: 14px; }
    </style>
</head>
<body>

    <div id="hud">
        <div>SAĞLIK</div>
        <div class="bar-container"><div class="bar-fill" id="healthBar"></div></div>
        <div>MERMİ</div>
        <div class="bar-container"><div class="bar-fill" id="ammoBar"></div></div>
    </div>
    <div id="score">Skor: 0</div>
    <div id="crosshair"></div>
    <div id="instructions">Oynamak için ekrana tıkla<br>WASD: Hareket | Mouse: Bakış | Sol Tık: Ateş | E: At | Shift: Koş</div>

    <div id="mobileControls">
        <div class="joy-bg" id="joyBg"><div class="joy-knob" id="joyKnob"></div></div>
        <div class="action-btns">
            <div class="btn" id="btnHorse">At (E)</div>
            <div class="btn" id="btnRun">Koş</div>
            <div class="btn" id="btnShoot">Ateş</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- TEMEL DEĞİŞKENLER ---
        let scene, camera, renderer, clock;
        let player, horse;
        let enemies = [], bullets = [];
        let score = 0, health = 100, ammo = 50;
        
        // Input States
        let keys = { w: false, a: false, s: false, d: false, shift: false };
        let joyVector = { x: 0, y: 0 };
        let onHorse = false;
        
        // Kamera açıları (Euler)
        let yaw = 0;   // Sağ/Sol
        let pitch = 0; // Yukarı/Aşağı

        // Cihaz Kontrolü
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xFF8C42);
            scene.fog = new THREE.Fog(0xFF8C42, 20, 150);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Işık
            scene.add(new THREE.AmbientLight(0x404040, 2));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(100, 100, 50);
            scene.add(dirLight);

            // Zemin
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 1 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            createPlayer();
            createHorse();
            for(let i=0; i<30; i++) spawnProp(); // Basit çevre
            for(let i=0; i<5; i++) spawnEnemy();

            setupInputs();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        // --- NESNE OLUŞTURMA ---
        function createPlayer() {
            player = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x4169E1}));
            body.position.y = 1;
            player.add(body);
            scene.add(player);
        }

        function createHorse() {
            horse = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 3), new THREE.MeshStandardMaterial({color: 0x8B4513}));
            horse.position.set(-10, 0.75, -10);
            scene.add(horse);
        }

        function spawnProp() {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 1), new THREE.MeshStandardMaterial({color: 0x2E7D32}));
            mesh.position.set((Math.random()-0.5)*100, 2, (Math.random()-0.5)*100);
            scene.add(mesh);
        }

        function spawnEnemy() {
            const enemy = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x2F4F4F}));
            enemy.position.set((Math.random()-0.5)*80, 1, (Math.random()-0.5)*80);
            enemy.userData = { health: 3, speed: 2 + Math.random() };
            enemies.push(enemy);
            scene.add(enemy);
        }

        function shoot() {
            if (ammo <= 0) return;
            ammo--;
            document.getElementById('ammoBar').style.width = (ammo/50*100) + '%';
            
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xFFFF00}));
            bullet.position.copy(player.position);
            bullet.position.y += 1.5;
            
            // Merminin gidiş yönünü kameranın baktığı yöne ayarla
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            bullet.userData = { velocity: dir.multiplyScalar(40), life: 0 }; // Saniyede 40 birim hız
            
            bullets.push(bullet);
            scene.add(bullet);
        }

        // --- INPUT SİSTEMİ ---
        function setupInputs() {
            if (isMobile) {
                document.getElementById('mobileControls').style.display = 'block';
                document.getElementById('instructions').style.display = 'none';
                setupTouchInputs();
            } else {
                setupPCInputs();
            }
        }

        function setupPCInputs() {
            // Klavye
            window.addEventListener('keydown', e => {
                let key = e.key.toLowerCase();
                if(keys.hasOwnProperty(key)) keys[key] = true;
                if(key === 'e') toggleHorse();
            });
            window.addEventListener('keyup', e => {
                let key = e.key.toLowerCase();
                if(keys.hasOwnProperty(key)) keys[key] = false;
            });

            // Pointer Lock (Mouse Ekrana Kilitleme)
            document.body.addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            // Mouse ile Ateş ve Bakış
            window.addEventListener('mousedown', e => {
                if (document.pointerLockElement === document.body && e.button === 0) shoot();
            });

            window.addEventListener('mousemove', e => {
                if (document.pointerLockElement === document.body) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch)); // Kameranın takla atmasını engelle
                }
            });
        }

        function setupTouchInputs() {
            const joyBg = document.getElementById('joyBg');
            const joyKnob = document.getElementById('joyKnob');
            
            let joyTouchId = null;
            let joyCenter = { x: 0, y: 0 };
            let lastCamTouch = {}; // Kamera hareketi için son parmak konumu

            // Butonlar
            document.getElementById('btnShoot').addEventListener('pointerdown', e => { e.stopPropagation(); shoot(); });
            document.getElementById('btnHorse').addEventListener('pointerdown', e => { e.stopPropagation(); toggleHorse(); });
            
            const btnRun = document.getElementById('btnRun');
            btnRun.addEventListener('pointerdown', e => { e.stopPropagation(); keys.shift = true; btnRun.style.background = "white"; btnRun.style.color="black"; });
            btnRun.addEventListener('pointerup', e => { e.stopPropagation(); keys.shift = false; btnRun.style.background = "rgba(0,0,0,0.5)"; btnRun.style.color="white"; });

            // Ekrana Dokunma
            window.addEventListener('touchstart', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    
                    // Ekranın sol yarısı: Joystick
                    if (touch.clientX < window.innerWidth / 2 && joyTouchId === null) {
                        joyTouchId = touch.identifier;
                        // Joystick'in merkeze olan uzaklığını hesaplamak için konumunu al
                        let rect = joyBg.getBoundingClientRect();
                        joyCenter = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                        updateJoystick(touch.clientX, touch.clientY);
                    } 
                    // Ekranın sağ yarısı: Kamera
                    else {
                        // Butonlara basılmadıysa kamerayı çevir
                        if (touch.target.className !== 'btn') {
                            lastCamTouch[touch.identifier] = { x: touch.clientX, y: touch.clientY };
                        }
                    }
                }
            }, { passive: false });

            window.addEventListener('touchmove', e => {
                e.preventDefault(); // Ekran kaymasını engelle
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    
                    // Joystick Hareketi
                    if (touch.identifier === joyTouchId) {
                        updateJoystick(touch.clientX, touch.clientY);
                    }
                    // Kamera Hareketi
                    else if (lastCamTouch[touch.identifier]) {
                        let dx = touch.clientX - lastCamTouch[touch.identifier].x;
                        let dy = touch.clientY - lastCamTouch[touch.identifier].y;
                        
                        yaw -= dx * 0.005;
                        pitch -= dy * 0.005;
                        pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
                        
                        lastCamTouch[touch.identifier] = { x: touch.clientX, y: touch.clientY };
                    }
                }
            }, { passive: false });

            window.addEventListener('touchend', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let touch = e.changedTouches[i];
                    
                    if (touch.identifier === joyTouchId) {
                        joyTouchId = null;
                        joyVector = { x: 0, y: 0 };
                        joyKnob.style.transform = `translate(-50%, -50%)`;
                    } else if (lastCamTouch[touch.identifier]) {
                        delete lastCamTouch[touch.identifier];
                    }
                }
            });

            function updateJoystick(tx, ty) {
                let dx = tx - joyCenter.x;
                let dy = ty - joyCenter.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let maxDist = 40; // Joystick sınır
                
                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                }
                
                joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joyVector.x = dx / maxDist; // -1 ile 1 arası
                joyVector.y = dy / maxDist; // -1 ile 1 arası
            }
        }

        function toggleHorse() {
            if (player.position.distanceTo(horse.position) < 5) onHorse = !onHorse;
        }

        // --- ANA OYUN DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (health <= 0) return; // Oyun bitti durumu

            // 1. OYUNCU HAREKETİ (Klavye veya Joystick)
            let speed = (onHorse ? 15 : 6) * (keys.shift ? 1.8 : 1);
            let moveX = 0, moveZ = 0;

            if (isMobile) {
                moveX = joyVector.x;
                moveZ = joyVector.y;
            } else {
                if (keys.w) moveZ -= 1;
                if (keys.s) moveZ += 1;
                if (keys.a) moveX -= 1;
                if (keys.d) moveX += 1;
            }

            // Hareketi kameranın baktığı yöne (Yaw) göre hesapla
            if (moveX !== 0 || moveZ !== 0) {
                const dir = new THREE.Vector3(moveX, 0, moveZ).normalize();
                dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw); // Kamera açısına göre döndür
                
                player.position.add(dir.multiplyScalar(speed * delta));
                if (onHorse) horse.position.copy(player.position).add(new THREE.Vector3(0,-0.25,0));
            }

            // 2. KAMERA TAKİBİ VE DÖNÜŞÜ (Third Person)
            // Kameranın pozisyonunu karakterin arkasında ve yukarısında hesapla
            const camDistance = 6;
            const camHeight = 3;
            
            camera.position.x = player.position.x - Math.sin(yaw) * camDistance * Math.cos(pitch);
            camera.position.y = player.position.y + camHeight + Math.sin(pitch) * camDistance;
            camera.position.z = player.position.z - Math.cos(yaw) * camDistance * Math.cos(pitch);
            
            // Kamera her zaman karaktere veya biraz üstüne baksın
            const lookTarget = player.position.clone();
            lookTarget.y += 1.5;
            camera.lookAt(lookTarget);

            // 3. MERMİ FİZİĞİ
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.position.add(b.userData.velocity.clone().multiplyScalar(delta));
                b.userData.life += delta;
                
                if (b.userData.life > 2) {
                    scene.remove(b); bullets.splice(i, 1); continue;
                }

                // Düşman Vurma Kontrolü
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let enemy = enemies[j];
                    if (b.position.distanceTo(enemy.position) < 1.5) {
                        enemy.userData.health--;
                        scene.remove(b); bullets.splice(i, 1);
                        if (enemy.userData.health <= 0) {
                            scene.remove(enemy); enemies.splice(j, 1);
                            score += 10; document.getElementById('score').innerText = "Skor: " + score;
                            setTimeout(spawnEnemy, 2000); // Yeniden doğur
                        }
                        break;
                    }
                }
            }

            // 4. DÜŞMAN YAPAY ZEKASI
            enemies.forEach(enemy => {
                let dir = new THREE.Vector3().subVectors(player.position, enemy.position);
                dir.y = 0; dir.normalize();
                enemy.position.add(dir.multiplyScalar(enemy.userData.speed * delta));
                enemy.lookAt(player.position);

                if (enemy.position.distanceTo(player.position) < 2) {
                    health -= 10 * delta; // Saniyede 10 hasar
                    document.getElementById('healthBar').style.width = Math.max(0, health) + '%';
                }
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
