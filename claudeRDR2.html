<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red Dead Redemption 2 - Vahşi Batı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Georgia', serif;
            background: linear-gradient(to bottom, #FF6B35 0%, #F7931E 50%, #C1666B 100%);
            touch-action: none; /* Mobilde kaydırmayı engeller */
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #gameTitle {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(24px, 5vw, 64px);
            font-weight: bold;
            color: #8B0000;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9), 0 0 15px #FFD700;
            letter-spacing: 4px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            width: 100%;
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 2px 2px 4px rgba(0,0,0,0.9), 0 0 15px #FFD700; }
            50% { text-shadow: 2px 2px 4px rgba(0,0,0,0.9), 0 0 30px #FFD700, 0 0 50px #FF6B35; }
        }

        #hud {
            position: absolute;
            top: 80px;
            left: 20px;
            color: white;
            font-size: 16px;
            z-index: 10;
            pointer-events: none;
        }

        .bar { margin: 10px 0; }
        .bar-label { font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .bar-container {
            width: clamp(150px, 30vw, 300px);
            height: 25px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #8B4513;
            border-radius: 8px;
            overflow: hidden;
        }
        .bar-fill { height: 100%; transition: width 0.3s ease; }
        .health-bar { background: linear-gradient(to right, #DC143C, #8B0000); }
        .ammo-bar { background: linear-gradient(to right, #FFD700, #DAA520); }

        #score {
            position: absolute;
            top: 80px;
            right: 20px;
            color: #FFD700;
            font-size: clamp(20px, 4vw, 36px);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            z-index: 10;
        }

        #killStreak {
            position: absolute;
            top: 130px;
            right: 20px;
            color: #FF4500;
            font-size: clamp(16px, 3vw, 24px);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 10;
        }

        .crosshair-line { position: absolute; background: rgba(255, 255, 255, 0.9); box-shadow: 0 0 4px rgba(0,0,0,0.9); }
        .crosshair-h { width: 20px; height: 2px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .crosshair-v { width: 2px; height: 20px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #8B4513;
            z-index: 10;
            pointer-events: none;
            white-space: nowrap;
        }

        #damageOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0);
            pointer-events: none;
            transition: background 0.2s;
            z-index: 5;
        }

        /* MOBİL KONTROLLER */
        #mobileControls { display: none; }
        
        .joystick-zone {
            position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px;
            background: rgba(0,0,0,0.4); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
            z-index: 20; touch-action: none;
        }
        .joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255,255,255,0.6); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }

        .action-buttons {
            position: absolute; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 20;
        }
        .btn {
            width: 60px; height: 60px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%; color: white; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; justify-content: center; touch-action: none;
        }
        .btn:active { background: rgba(255,255,255,0.3); }

        @media (max-width: 768px) {
            #instructions { display: none; } /* Mobilde klavye bilgisini gizle */
            #mobileControls { display: block; } /* Dokunmatik kontrolleri aç */
        }
    </style>
</head>

<body>
    <div id="gameTitle">RED DEAD REDEMPTION 2</div>

    <div id="hud">
        <div class="bar">
            <div class="bar-label">❤ Sağlık</div>
            <div class="bar-container"><div class="bar-fill health-bar" id="healthBar" style="width: 100%"></div></div>
        </div>
        <div class="bar">
            <div class="bar-label">🔫 Mermi</div>
            <div class="bar-container"><div class="bar-fill ammo-bar" id="ammoBar" style="width: 100%"></div></div>
        </div>
    </div>

    <div id="score">Skor: 0</div>
    <div id="killStreak"></div>

    <div id="crosshair">
        <div class="crosshair-line crosshair-h"></div>
        <div class="crosshair-line crosshair-v"></div>
    </div>

    <div id="instructions">🎮 WASD: Hareket | SHIFT: Koş | Ekrana Tıkla/Boşluk: Ateş | E: Ata Bin/İn</div>
    <div id="damageOverlay"></div>

    <div id="mobileControls">
        <div class="joystick-zone" id="joystickZone">
            <div class="joystick-knob" id="joystickKnob"></div>
        </div>
        <div class="action-buttons">
            <div class="btn" id="btnHorse">At (E)</div>
            <div class="btn" id="btnRun">Koş</div>
            <div class="btn" id="btnShoot" style="background: rgba(220, 20, 60, 0.6);">Ateş</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player, horse;
        let enemies = [], bullets = [], rocks = [], cacti = [], trees = [];
        let keys = {}, mouseX = 0, mouseY = 0;
        let score = 0, killStreak = 0, lastKillTime = 0;
        let playerHealth = 100, playerAmmo = 50;
        let onHorse = false, isRunning = false;
        let clock = new THREE.Clock();

        // Mobil Joystick Değişkenleri
        let joyActive = false;
        let joyMove = { x: 0, y: 0 };
        let joyOrigin = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0xD2691E, 50, 300);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 25);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Mobil performans ve netlik
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // Işıklandırma
            scene.add(new THREE.AmbientLight(0xFF8C42, 0.7));
            const sunLight = new THREE.DirectionalLight(0xFFB347, 1.0);
            sunLight.position.set(80, 120, 80);
            sunLight.castShadow = true;
            sunLight.shadow.camera.left = -100; sunLight.shadow.camera.right = 100;
            sunLight.shadow.camera.top = 100; sunLight.shadow.camera.bottom = -100;
            scene.add(sunLight);
            scene.add(new THREE.DirectionalLight(0xFF6B35, 0.5).position.set(-50, 50, -50));

            // Zemin
            const groundMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.95 });
            const groundGeo = new THREE.PlaneGeometry(600, 600, 30, 30);
            const pos = groundGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) pos.setZ(i, pos.getZ(i) + Math.random() * 3 - 1.5);
            groundGeo.computeVertexNormals();
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            createPlayer();
            createHorse();
            createEnvironment();

            for (let i = 0; i < 6; i++) setTimeout(() => spawnEnemy(), i * 1500);

            // Event Listeners (PC)
            document.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                if(e.key === ' ') shoot();
                if(e.key.toLowerCase() === 'e') toggleHorse();
                if(e.key === 'Shift') isRunning = true;
            });
            document.addEventListener('keyup', e => {
                keys[e.key.toLowerCase()] = false;
                if(e.key === 'Shift') isRunning = false;
            });
            document.addEventListener('mousemove', e => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            document.addEventListener('mousedown', (e) => {
                if(e.target.tagName !== 'DIV' || e.target.id === 'damageOverlay') shoot();
            });

            window.addEventListener('resize', onWindowResize);

            setupMobileControls();

            animate();
        }

        function toggleHorse() {
            if (player.position.distanceTo(horse.position) < 6) onHorse = !onHorse;
        }

        function setupMobileControls() {
            const joyZone = document.getElementById('joystickZone');
            const joyKnob = document.getElementById('joystickKnob');

            joyZone.addEventListener('pointerdown', (e) => {
                joyActive = true;
                joyOrigin = { x: e.clientX, y: e.clientY };
                joyKnob.style.transition = 'none';
            });
            
            document.addEventListener('pointermove', (e) => {
                // Kamera çevirme (sağ ekran, joystick aktif değilse)
                if (!joyActive && e.clientX > window.innerWidth / 2) {
                    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
                }

                // Joystick hareketi
                if (!joyActive) return;
                let dx = e.clientX - joyOrigin.x;
                let dy = e.clientY - joyOrigin.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let max = 40;
                
                if (dist > max) { dx = (dx/dist)*max; dy = (dy/dist)*max; }
                
                joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joyMove.x = dx / max;
                joyMove.y = dy / max;
            });

            document.addEventListener('pointerup', () => {
                joyActive = false;
                joyMove = { x: 0, y: 0 };
                joyKnob.style.transition = 'transform 0.2s';
                joyKnob.style.transform = `translate(-50%, -50%)`;
            });

            // Butonlar
            document.getElementById('btnShoot').addEventListener('pointerdown', (e) => { e.stopPropagation(); shoot(); });
            const btnRun = document.getElementById('btnRun');
            btnRun.addEventListener('pointerdown', (e) => { e.stopPropagation(); isRunning = true; btnRun.style.background = "rgba(255,255,255,0.4)"; });
            btnRun.addEventListener('pointerup', (e) => { e.stopPropagation(); isRunning = false; btnRun.style.background = "rgba(0,0,0,0.5)"; });
            document.getElementById('btnHorse').addEventListener('pointerdown', (e) => { e.stopPropagation(); toggleHorse(); });
        }

        function createPlayer() {
            player = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x4169E1 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.2, 1.1), mat);
            body.position.y = 2; body.castShadow = true; player.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.65, 16, 16), new THREE.MeshStandardMaterial({ color: 0xFFDBAC }));
            head.position.y = 3.6; head.castShadow = true; player.add(head);
            const hatMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const hatBrim = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.12, 16), hatMat);
            hatBrim.position.y = 4.1; hatBrim.castShadow = true; player.add(hatBrim);
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 1.4), new THREE.MeshStandardMaterial({ color: 0x2F4F4F }));
            gun.position.set(1.1, 2, -0.9); gun.castShadow = true; player.add(gun);
            scene.add(player);
        }

        function createHorse() {
            horse = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.7, 4), mat);
            body.position.y = 2.2; body.castShadow = true; horse.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.4, 1.4), mat);
            head.position.set(0, 2.7, -2.8); head.castShadow = true; horse.add(head);
            horse.position.set(-12, 0, -12);
            scene.add(horse);
        }

        function createEnvironment() {
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x696969, roughness: 0.9 });
            for (let i = 0; i < 30; i++) {
                const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(Math.random() * 2 + 1, 0), rockMat);
                rock.position.set((Math.random() - 0.5) * 250, 0.5, (Math.random() - 0.5) * 250);
                rock.castShadow = true; scene.add(rock);
            }
            const cactusMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
            for (let i = 0; i < 20; i++) {
                const cactus = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 4, 8), cactusMat);
                cactus.position.set((Math.random() - 0.5) * 250, 2, (Math.random() - 0.5) * 250);
                cactus.castShadow = true; scene.add(cactus);
            }
        }

        function spawnEnemy() {
            const enemy = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 1), new THREE.MeshStandardMaterial({ color: 0x2F4F4F }));
            body.position.y = 2; body.castShadow = true; enemy.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), new THREE.MeshStandardMaterial({ color: 0xFFDBAC }));
            head.position.y = 3.5; head.castShadow = true; enemy.add(head);
            const angle = Math.random() * Math.PI * 2;
            const dist = 40 + Math.random() * 30;
            enemy.position.set(player.position.x + Math.cos(angle)*dist, 0, player.position.z + Math.sin(angle)*dist);
            enemy.userData = { health: 3, speed: 0.06 + Math.random() * 0.04 };
            enemies.push(enemy); scene.add(enemy);
        }

        function shoot() {
            if (playerAmmo <= 0 || playerHealth <= 0) return;
            playerAmmo--;
            document.getElementById('ammoBar').style.width = (playerAmmo / 50 * 100) + '%';
            
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshBasicMaterial({ color: 0xFFD700 }));
            bullet.position.copy(player.position); bullet.position.y += 3.5;
            
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            bullet.userData = { velocity: dir.multiplyScalar(2.5), life: 0 };
            bullets.push(bullet); scene.add(bullet);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function gameOver() {
            const el = document.getElementById('damageOverlay');
            el.style.background = 'rgba(0, 0, 0, 0.85)';
            el.innerHTML = `<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center;">
                <h1 style="color:#DC143C; font-size:4rem;">ÖLDÜN</h1>
                <h2 style="color:#FFD700; margin: 20px 0;">Skor: ${score}</h2>
                <button onclick="location.reload()" style="padding:15px 30px; font-size:20px; cursor:pointer;">Tekrar Oyna</button>
            </div>`;
            el.style.pointerEvents = "auto";
        }

        function animate() {
            requestAnimationFrame(animate);
            if (playerHealth <= 0) return;

            const delta = clock.getDelta();
            const speed = (onHorse ? 0.35 : 0.18) * (isRunning ? 1.6 : 1);
            const moveDir = new THREE.Vector3();

            // Klavye
            if (keys['w'] || keys['arrowup']) moveDir.z -= 1;
            if (keys['s'] || keys['arrowdown']) moveDir.z += 1;
            if (keys['a'] || keys['arrowleft']) moveDir.x -= 1;
            if (keys['d'] || keys['arrowright']) moveDir.x += 1;

            // Joystick (Klavye yoksa üzerine yazar)
            if (joyMove.x !== 0 || joyMove.y !== 0) {
                moveDir.x = joyMove.x;
                moveDir.z = joyMove.y;
            }

            if (moveDir.lengthSq() > 0) {
                moveDir.normalize();
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                camDir.y = 0; camDir.normalize();
                const right = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0, 1, 0));
                
                const movement = new THREE.Vector3();
                movement.addScaledVector(camDir, -moveDir.z);
                movement.addScaledVector(right, moveDir.x);
                player.position.add(movement.multiplyScalar(speed));
                if (onHorse) horse.position.copy(player.position);
            }

            // Kamera Takibi
            camera.position.x = player.position.x + Math.sin(mouseX * 0.5) * 15;
            camera.position.y = player.position.y + 12 + mouseY * 5;
            camera.position.z = player.position.z + Math.cos(mouseX * 0.5) * 15 + 25;
            camera.lookAt(player.position.x, player.position.y + 2, player.position.z);

            // Düşmanlar
            enemies.forEach((enemy, i) => {
                const dir = new THREE.Vector3().subVectors(player.position, enemy.position);
                dir.y = 0; dir.normalize();
                enemy.position.add(dir.multiplyScalar(enemy.userData.speed));
                enemy.lookAt(player.position);
                
                if (enemy.position.distanceTo(player.position) < 5 && Math.random() < 0.02) {
                    playerHealth -= 5;
                    document.getElementById('healthBar').style.width = Math.max(0, playerHealth) + '%';
                    document.getElementById('damageOverlay').style.background = 'rgba(255,0,0,0.4)';
                    setTimeout(() => document.getElementById('damageOverlay').style.background = 'transparent', 200);
                    if (playerHealth <= 0) gameOver();
                }
            });

            // Mermiler
            bullets.forEach((bullet, bIdx) => {
                bullet.position.add(bullet.userData.velocity);
                bullet.userData.life += delta;
                if (bullet.userData.life > 2) { scene.remove(bullet); bullets.splice(bIdx, 1); return; }

                enemies.forEach((enemy, eIdx) => {
                    if (bullet.position.distanceTo(enemy.position) < 2.5) {
                        enemy.userData.health--;
                        scene.remove(bullet); bullets.splice(bIdx, 1);
                        if (enemy.userData.health <= 0) {
                            scene.remove(enemy); enemies.splice(eIdx, 1);
                            score += 10;
                            document.getElementById('score').innerText = 'Skor: ' + score;
                            setTimeout(spawnEnemy, 2000);
                        }
                    }
                });
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
