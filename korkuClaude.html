<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karanlık Mahzen</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff0000;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
            z-index: 100;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 24px;
            text-align: center;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border: 3px solid #ff0000;
            cursor: pointer;
        }
        #jumpscare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 300;
            animation: flicker 0.1s infinite;
        }
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 48px;
            text-align: center;
            display: none;
            z-index: 400;
            text-shadow: 0 0 20px #ff0000;
        }
    </style>
</head>
<body>
    <div id="info">
        <div>Mahzenden Kaç!</div>
        <div id="keys">Anahtarlar: 0/3</div>
        <div id="health">Sağlık: 100</div>
        <div style="font-size: 14px; margin-top: 10px;">WASD: Hareket | Fare: Bakış | Sol Tık: Fener Aç/Kapa</div>
    </div>
    <div id="instructions">
        <h1 style="color: #ff0000; margin-bottom: 20px;">KARANLIK MAHZEN</h1>
        <p>Terkedilmiş bir mahzende uyandın...</p>
        <p>3 anahtarı bul ve çıkış kapısından kaç!</p>
        <p style="margin-top: 30px;">Dikkatli ol... Yalnız değilsin...</p>
        <p style="margin-top: 30px; font-size: 18px;">BAŞLAMAK İÇİN TIKLA</p>
    </div>
    <div id="jumpscare"></div>
    <div id="gameOver"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, controls;
        let flashlight, isFlashlightOn = true;
        let monsters = [];
        let keys = [];
        let collectedKeys = 0;
        let playerHealth = 100;
        let gameStarted = false;
        let clock = new THREE.Clock();
        let exitDoor;
        
        const moveSpeed = 0.15;
        const moveState = { forward: false, backward: false, left: false, right: false };

        // Korku sesleri
        let audioContext, heartbeatInterval;
        let backgroundDrone;
        let lastScreamTime = 0;
        let breathingSound;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.03);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(-20, 1.6, -20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Ambient ışık (daha parlak)
            const ambientLight = new THREE.AmbientLight(0x2a2a2a);
            scene.add(ambientLight);

            // El feneri (daha güçlü)
            flashlight = new THREE.SpotLight(0xffffcc, 2.5);
            flashlight.angle = Math.PI / 6;
            flashlight.penumbra = 0.2;
            flashlight.decay = 1.5;
            flashlight.distance = 40;
            flashlight.castShadow = true;
            flashlight.shadow.camera.near = 0.1;
            flashlight.shadow.camera.far = 30;
            camera.add(flashlight);
            flashlight.target.position.set(0, 0, -1);
            camera.add(flashlight.target);
            scene.add(camera);

            // Zemin (daha görünür)
            const floorGeometry = new THREE.PlaneGeometry(100, 100);
            const floorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x3a3a3a,
                roughness: 0.8
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Duvarlar (labirent)
            createMaze();

            // Anahtarlar
            createKeys();

            // Çıkış kapısı
            createExitDoor();

            // Canavarlar
            createMonsters();

            // Kontroller
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('click', onClick);

            window.addEventListener('resize', onResize);

            document.getElementById('instructions').addEventListener('click', startGame);
        }

        function startGame() {
            document.getElementById('instructions').style.display = 'none';
            gameStarted = true;
            
            renderer.domElement.requestPointerLock();
            
            document.addEventListener('mousemove', onMouseMove);
            
            // Ses sistemini başlat
            initAudio();
            playAmbientSound();
            playBreathingSound();
            
            animate();
        }

        function createMaze() {
            const wallMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x4a4a4a,
                roughness: 0.9
            });

            const walls = [
                // Dış duvarlar
                { x: 0, z: -25, w: 50, h: 5, d: 1 },
                { x: 0, z: 25, w: 50, h: 5, d: 1 },
                { x: -25, z: 0, w: 1, h: 5, d: 50 },
                { x: 25, z: 0, w: 1, h: 5, d: 50 },
                
                // İç duvarlar (labirent)
                { x: -10, z: -10, w: 1, h: 5, d: 15 },
                { x: 10, z: -10, w: 1, h: 5, d: 15 },
                { x: 0, z: 5, w: 20, h: 5, d: 1 },
                { x: -15, z: 10, w: 10, h: 5, d: 1 },
                { x: 15, z: 10, w: 10, h: 5, d: 1 },
                { x: -5, z: -5, w: 8, h: 5, d: 1 },
                { x: 8, z: 15, w: 1, h: 5, d: 10 },
            ];

            walls.forEach(w => {
                const geometry = new THREE.BoxGeometry(w.w, w.h, w.d);
                const wall = new THREE.Mesh(geometry, wallMaterial);
                wall.position.set(w.x, w.h/2, w.z);
                wall.castShadow = true;
                wall.receiveShadow = true;
                scene.add(wall);
            });
        }

        function createKeys() {
            const keyPositions = [
                { x: -15, z: -15 },
                { x: 18, z: 18 },
                { x: -18, z: 18 }
            ];

            keyPositions.forEach(pos => {
                const keyGroup = new THREE.Group();
                
                const handleGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.3, 8);
                const toothGeometry = new THREE.BoxGeometry(0.15, 0.1, 0.05);
                const keyMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xffd700,
                    emissive: 0xffd700,
                    emissiveIntensity: 0.5,
                    metalness: 0.8
                });
                
                const handle = new THREE.Mesh(handleGeometry, keyMaterial);
                const tooth = new THREE.Mesh(toothGeometry, keyMaterial);
                tooth.position.y = -0.15;
                
                keyGroup.add(handle);
                keyGroup.add(tooth);
                keyGroup.position.set(pos.x, 0.5, pos.z);
                keyGroup.userData.isKey = true;
                
                scene.add(keyGroup);
                keys.push(keyGroup);
            });
        }

        function createExitDoor() {
            const doorGeometry = new THREE.BoxGeometry(3, 4, 0.2);
            const doorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x8B4513,
                emissive: 0x000000
            });
            exitDoor = new THREE.Mesh(doorGeometry, doorMaterial);
            exitDoor.position.set(20, 2, -20);
            exitDoor.userData.isDoor = true;
            scene.add(exitDoor);

            // Kapı ışığı
            const doorLight = new THREE.PointLight(0x00ff00, 0, 5);
            doorLight.position.copy(exitDoor.position);
            scene.add(doorLight);
            exitDoor.userData.light = doorLight;
        }

        function createMonsters() {
            const monsterPositions = [
                { x: -12, z: 12 },
                { x: 12, z: -12 },
                { x: 5, z: 5 }
            ];

            monsterPositions.forEach((pos, index) => {
                const monster = new THREE.Group();
                
                // Ana gövde - daha büyük ve korkunç
                const bodyGeometry = new THREE.SphereGeometry(1.2, 16, 16);
                bodyGeometry.scale(1, 1.5, 1); // Uzun ve ince
                const bodyMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x0a0a0a,
                    emissive: 0x2a0000,
                    emissiveIntensity: 0.5,
                    roughness: 0.9
                });
                const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                body.position.y = 2;
                monster.add(body);
                
                // Kafa - kafatası gibi
                const headGeometry = new THREE.SphereGeometry(0.6, 16, 16);
                const head = new THREE.Mesh(headGeometry, bodyMaterial);
                head.position.y = 3.2;
                monster.add(head);
                
                // Korkunç kırmızı gözler - daha büyük
                const eyeGeometry = new THREE.SphereGeometry(0.2, 8, 8);
                const eyeMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0xff0000,
                    emissive: 0xff0000
                });
                
                const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                leftEye.position.set(-0.3, 3.3, 0.5);
                monster.add(leftEye);
                
                const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
                rightEye.position.set(0.3, 3.3, 0.5);
                monster.add(rightEye);
                
                // Göz ışığı
                const eyeLight = new THREE.PointLight(0xff0000, 1, 5);
                eyeLight.position.set(0, 3.3, 0.5);
                monster.add(eyeLight);
                
                // Uzun, kemikli kollar
                for (let i = 0; i < 2; i++) {
                    const armGeometry = new THREE.CylinderGeometry(0.08, 0.12, 2, 8);
                    const arm = new THREE.Mesh(armGeometry, bodyMaterial);
                    arm.position.set(i === 0 ? -1 : 1, 1.5, 0);
                    arm.rotation.z = (i === 0 ? 1 : -1) * Math.PI / 3;
                    monster.add(arm);
                    
                    // Pençeler
                    for (let j = 0; j < 3; j++) {
                        const clawGeometry = new THREE.ConeGeometry(0.05, 0.3, 4);
                        const claw = new THREE.Mesh(clawGeometry, new THREE.MeshBasicMaterial({ color: 0x1a0000 }));
                        claw.position.set(
                            (i === 0 ? -1.5 : 1.5) + (j - 1) * 0.1, 
                            0.3, 
                            0.2
                        );
                        claw.rotation.x = Math.PI;
                        monster.add(claw);
                    }
                }
                
                // Kaburgalar (korkunç detay)
                for (let i = 0; i < 5; i++) {
                    const ribGeometry = new THREE.TorusGeometry(0.5, 0.05, 8, 16, Math.PI);
                    const rib = new THREE.Mesh(ribGeometry, bodyMaterial);
                    rib.position.y = 2.5 - i * 0.3;
                    rib.rotation.z = Math.PI / 2;
                    monster.add(rib);
                }
                
                monster.position.set(pos.x, 0, pos.z);
                monster.userData.isMonster = true;
                monster.userData.speed = 0.02 + index * 0.008;
                monster.userData.chaseDistance = 12;
                monster.userData.attackDistance = 2;
                monster.userData.wanderAngle = Math.random() * Math.PI * 2;
                monster.userData.lastScreamTime = 0;
                
                scene.add(monster);
                monsters.push(monster);
            });
        }

        function onKeyDown(e) {
            switch(e.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyD': moveState.right = true; break;
            }
        }

        function onKeyUp(e) {
            switch(e.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyD': moveState.right = false; break;
            }
        }

        function onClick() {
            if (!gameStarted) return;
            isFlashlightOn = !isFlashlightOn;
            flashlight.intensity = isFlashlightOn ? 2.5 : 0.3;
        }

        let yaw = 0, pitch = 0;
        function onMouseMove(e) {
            if (!gameStarted) return;
            
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
            
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        function updateMovement() {
            const direction = new THREE.Vector3();
            const right = new THREE.Vector3();
            
            camera.getWorldDirection(direction);
            direction.y = 0;
            direction.normalize();
            
            right.crossVectors(camera.up, direction).normalize();
            
            const velocity = new THREE.Vector3();
            
            if (moveState.forward) velocity.add(direction.multiplyScalar(moveSpeed));
            if (moveState.backward) velocity.add(direction.multiplyScalar(-moveSpeed));
            if (moveState.left) velocity.add(right.multiplyScalar(moveSpeed));
            if (moveState.right) velocity.add(right.multiplyScalar(-moveSpeed));
            
            camera.position.add(velocity);
            
            // Sınırlar
            camera.position.x = Math.max(-24, Math.min(24, camera.position.x));
            camera.position.z = Math.max(-24, Math.min(24, camera.position.z));
        }

        function updateMonsters() {
            const playerPos = camera.position.clone();
            const currentTime = Date.now();
            
            monsters.forEach(monster => {
                const monsterPos = monster.position.clone();
                monsterPos.y = playerPos.y;
                
                const distance = playerPos.distanceTo(monsterPos);
                
                // Korkunç sallanma animasyonu
                monster.rotation.y += 0.02;
                monster.position.y = Math.sin(Date.now() * 0.005) * 0.2;
                monster.rotation.z = Math.sin(Date.now() * 0.003) * 0.1;
                
                // Göz yanıp sönme
                monster.children.forEach(child => {
                    if (child.material && child.material.emissive) {
                        const intensity = 0.8 + Math.sin(Date.now() * 0.01) * 0.2;
                        child.material.emissiveIntensity = intensity;
                    }
                });
                
                if (distance < monster.userData.chaseDistance) {
                    // Oyuncuya doğru hareket
                    const direction = new THREE.Vector3().subVectors(playerPos, monsterPos).normalize();
                    monster.position.x += direction.x * monster.userData.speed;
                    monster.position.z += direction.z * monster.userData.speed;
                    
                    monster.lookAt(playerPos);
                    
                    // Yakınsa çığlık at
                    if (distance < 8 && currentTime - monster.userData.lastScreamTime > 5000) {
                        playScream(distance);
                        monster.userData.lastScreamTime = currentTime;
                    }
                    
                    if (distance < monster.userData.attackDistance) {
                        triggerJumpscare();
                        damagePlayer(8);
                    } else if (distance < 6) {
                        // Yakınsa kalp atışını hızlandır
                        playHeartbeat();
                        playFootsteps(distance);
                    }
                } else {
                    // Rastgele dolaş
                    monster.userData.wanderAngle += (Math.random() - 0.5) * 0.1;
                    const wanderDir = new THREE.Vector3(
                        Math.cos(monster.userData.wanderAngle),
                        0,
                        Math.sin(monster.userData.wanderAngle)
                    );
                    monster.position.x += wanderDir.x * monster.userData.speed * 0.3;
                    monster.position.z += wanderDir.z * monster.userData.speed * 0.3;
                }
                
                // Sınırlar içinde tut
                monster.position.x = Math.max(-23, Math.min(23, monster.position.x));
                monster.position.z = Math.max(-23, Math.min(23, monster.position.z));
            });
        }

        function checkKeyCollection() {
            keys.forEach((key, index) => {
                if (key.visible) {
                    const distance = camera.position.distanceTo(key.position);
                    if (distance < 2) {
                        key.visible = false;
                        collectedKeys++;
                        document.getElementById('keys').textContent = `Anahtarlar: ${collectedKeys}/3`;
                        
                        if (collectedKeys === 3) {
                            exitDoor.material.emissive.setHex(0x00ff00);
                            exitDoor.userData.light.intensity = 2;
                        }
                    }
                }
            });
        }

        function checkExit() {
            const distance = camera.position.distanceTo(exitDoor.position);
            if (distance < 3 && collectedKeys === 3) {
                endGame(true);
            }
        }

        function triggerJumpscare() {
            const jumpscare = document.getElementById('jumpscare');
            jumpscare.style.display = 'block';
            jumpscare.style.background = `radial-gradient(circle, rgba(255,0,0,0.9) 0%, rgba(0,0,0,1) 100%)`;
            
            // Jumpscare sesi
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(1200, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.8, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.3);
            
            // Kamera şoku
            const originalY = camera.position.y;
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    camera.position.y = originalY + (Math.random() - 0.5) * 0.3;
                    camera.rotation.z = (Math.random() - 0.5) * 0.2;
                }, i * 20);
            }
            
            setTimeout(() => {
                jumpscare.style.display = 'none';
                camera.position.y = originalY;
                camera.rotation.z = 0;
            }, 300);
        }

        function damagePlayer(damage) {
            playerHealth -= damage;
            document.getElementById('health').textContent = `Sağlık: ${Math.max(0, playerHealth)}`;
            
            if (playerHealth <= 0) {
                endGame(false);
            }
        }

        function endGame(won) {
            gameStarted = false;
            const gameOver = document.getElementById('gameOver');
            gameOver.style.display = 'block';
            
            if (won) {
                gameOver.innerHTML = `
                    <h1>KAÇTIN!</h1>
                    <p>Mahzenden kurtulmayı başardın...</p>
                    <p style="font-size: 24px; margin-top: 30px; cursor: pointer;" onclick="location.reload()">Tekrar Oyna</p>
                `;
            } else {
                gameOver.innerHTML = `
                    <h1>ÖLDÜN!</h1>
                    <p>Karanlık seni yakaladı...</p>
                    <p style="font-size: 24px; margin-top: 30px; cursor: pointer;" onclick="location.reload()">Tekrar Dene</p>
                `;
            }
        }

        function playAmbientSound() {
            // Karanlık drone sesi
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.value = 30;
            
            gainNode.gain.value = 0.05;
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            backgroundDrone = oscillator;
            
            // Rastgele gürültüler
            setInterval(() => {
                if (gameStarted && Math.random() > 0.7) {
                    playRandomNoise();
                }
            }, 8000);
        }
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playScream(distance) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.5);
            
            filter.type = 'lowpass';
            filter.frequency.value = 2000;
            
            const volume = Math.max(0.1, 1 - distance / 15);
            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
        }
        
        function playFootsteps(distance) {
            if (Math.random() > 0.95) {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 80;
                
                const volume = Math.max(0.05, 0.3 - distance / 20);
                gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.1);
            }
        }
        
        function playRandomNoise() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'triangle';
            oscillator.frequency.value = 100 + Math.random() * 300;
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 1);
        }
        
        function playBreathingSound() {
            setInterval(() => {
                if (!gameStarted) return;
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                const filter = audioContext.createBiquadFilter();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 150;
                
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.05, audioContext.currentTime + 1);
                gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 2);
                
                oscillator.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 2);
            }, 3000);
        }

        function playHeartbeat() {
            if (heartbeatInterval) return;
            
            heartbeatInterval = setInterval(() => {
                // Kalp atışı sesi
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 60;
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.2);
                
                // Kamera titremesi
                camera.position.y = 1.6 + Math.random() * 0.05;
                
                // Ekran kızarması
                renderer.domElement.style.filter = 'sepia(0.3) saturate(2) hue-rotate(-20deg)';
                setTimeout(() => {
                    renderer.domElement.style.filter = 'none';
                }, 100);
            }, 600);
            
            setTimeout(() => {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
                camera.position.y = 1.6;
            }, 4000);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            if (!gameStarted) return;
            
            requestAnimationFrame(animate);
            
            updateMovement();
            updateMonsters();
            checkKeyCollection();
            checkExit();
            
            // Anahtar animasyonu
            keys.forEach(key => {
                if (key.visible) {
                    key.rotation.y += 0.02;
                    key.position.y = 0.5 + Math.sin(Date.now() * 0.002) * 0.1;
                }
            });
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
